# ============================================================================
# docker-compose.yml — Identity Network full stack + Proxy
# ============================================================================

services:

  # ── Discovery server ───────────────────────────────────────────────────────
  discovery:
    build:
      context: .
      target: runtime
    image: identitynet:latest
    container_name: idn-discovery
    command: identitynet-discovery --port 7700
    ports:
      - "7700:7700"
    networks:
      idn-net:
        aliases:
          - discovery
    restart: unless-stopped

  # ── Identity server node ───────────────────────────────────────────────────
  server:
    build:
      context: .
      target: runtime
    image: identitynet:latest
    container_name: idn-server
    command: >-
      sh -c "identitynet-server init --key /data/server.key &&
             identitynet-server run --key /data/server.key --port 7701
             --host 0.0.0.0 --discovery discovery:7700 --allow-all"
    ports:
      - "7701:7701"
    volumes:
      - server-keys:/data
    networks:
      - idn-net
    depends_on:
      - discovery
    restart: unless-stopped

  # ── Proxy server (run this on your VPS) ───────────────────────────────────
  proxy-server:
    build:
      context: .
      target: runtime
    image: identitynet:latest
    container_name: idn-proxy-server
    command: >-
      sh -c "identitynet-proxy-server init --key /data/proxy_server.key &&
             identitynet-proxy-server run --key /data/proxy_server.key
             --port 7701 --allow-all"
    ports:
      - "7701:7701"
    volumes:
      - proxy-server-keys:/data
    networks:
      - idn-net
    restart: unless-stopped
    profiles:
      - proxy-server

  # ── Proxy client (run this on your Windows machine) ───────────────────────
  # After starting, configure browser SOCKS5: 127.0.0.1:1080
  proxy-client:
    build:
      context: .
      target: runtime
    image: identitynet:latest
    container_name: idn-proxy-client
    # Set SERVER_PUBKEY env variable before running:
    #   SERVER_PUBKEY=<base64> docker compose --profile proxy-client up proxy-client
    command: >-
      sh -c "identitynet-proxy-client init --key /data/proxy_client.key &&
             identitynet-proxy-client run
             --key /data/proxy_client.key
             --pubkey ${SERVER_PUBKEY:-REPLACE_WITH_SERVER_PUBKEY}
             --server-host ${SERVER_HOST:-127.0.0.1}
             --server-port ${SERVER_PORT:-7701}
             --proxy-port 1080"
    ports:
      - "1080:1080"
    volumes:
      - proxy-client-keys:/data
    network_mode: host
    profiles:
      - proxy-client

  # ── Test suite ─────────────────────────────────────────────────────────────
  tests:
    build:
      context: .
      target: runtime
    image: identitynet:latest
    container_name: idn-tests
    command: identitynet-tests
    networks:
      - idn-net
    profiles:
      - tests

  # ── Full in-process demo ───────────────────────────────────────────────────
  demo:
    build:
      context: .
      target: runtime
    image: identitynet:latest
    container_name: idn-demo
    command: identitynet-demo
    networks:
      - idn-net
    profiles:
      - demo

networks:
  idn-net:
    driver: bridge

volumes:
  server-keys:
  client-keys:
  proxy-server-keys:
  proxy-client-keys:
